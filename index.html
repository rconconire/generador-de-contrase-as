<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas Seguro</title>
    <!-- Referencia a hojas de estilo -->
    <link rel="stylesheet" href="./assets/css/style.css?v=2">
</head>
<body>

    <main class="app-container">
        
        <header class="app-header">
            <h1>Generador de Contraseñas</h1>
            <p>Por favor, configura tus preferencias para crear una contraseña segura.</p>
        </header>

        <section class="generator-card">
            
            <!-- Vista de la contraseña generada -->
            <div class="result-container">
                <input type="password" id="password-result" class="password-display" readonly placeholder="P4$5W0rD!">
                
                <div class="result-actions">
                    <button id="toggle-visibility-btn" class="icon-btn" aria-label="Mostrar/Ocultar contraseña" title="Mostrar/Ocultar">
                        <svg id="icon-eye-open" class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="icon-eye-closed" class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                    <button id="copy-btn" class="icon-btn" aria-label="Copiar contraseña" title="Copiar al portapapeles">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Contenedor del Toast de copiado (feedback visual) -->
            <div id="toast-container" class="toast-container"></div>

            <div class="settings-container">
                <!-- Longitud de contraseña -->
                <div class="setting-group length-group">
                    <div class="length-header">
                        <label for="length-slider">Longitud del carácter</label>
                        <span id="length-display" class="length-value">12</span>
                    </div>
                    <input type="range" id="length-slider" min="6" max="32" value="12" step="1">
                </div>

                <!-- Opciones (Checkboxes) -->
                <div class="setting-group checkboxes-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="uppercase-cb" checked>
                        <span class="checkmark"></span>
                        Incluir letras mayúsculas
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" id="lowercase-cb" checked>
                        <span class="checkmark"></span>
                        Incluir letras minúsculas
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" id="numbers-cb" checked>
                        <span class="checkmark"></span>
                        Incluir números
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" id="symbols-cb">
                        <span class="checkmark"></span>
                        Incluir símbolos
                    </label>
                </div>

                <!-- Fuerza de la contraseña -->
                <div class="strength-container">
                    <span class="strength-label">Fuerza</span>
                    <div class="strength-indicator">
                        <span id="strength-text" class="strength-text">Media</span>
                        <div class="strength-bars">
                            <div class="bar" id="bar-1"></div>
                            <div class="bar" id="bar-2"></div>
                            <div class="bar" id="bar-3"></div>
                            <div class="bar" id="bar-4"></div>
                            <div class="bar" id="bar-5"></div>
                            <div class="bar" id="bar-6"></div>
                            <div class="bar" id="bar-7"></div>
                            <div class="bar" id="bar-8"></div>
                            <div class="bar" id="bar-9"></div>
                            <div class="bar" id="bar-10"></div>
                        </div>
                    </div>
                </div>

                <!-- Botón Generar -->
                <button id="generate-btn" class="generate-btn">
                    Generar Contraseña
                </button>
            </div>

        </section>
    </main>

    <!-- Hacemos requerimiento del JS nativo aquí al final del body -->
    <script src="./assets/js/main.js?v=2"></script>
</body>
</html>
